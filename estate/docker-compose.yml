version: '3.8'

services:

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: ads-db
    environment:
      POSTGRES_DB: adsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  # Application (FrontOffice + BackOffice + FrontRest)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ads-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/adsdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
    ports:
      - "8081:8081"
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local

networks:
  app-network:
    driver: bridge