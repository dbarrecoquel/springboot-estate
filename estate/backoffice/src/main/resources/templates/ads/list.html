<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
  <title>Annonces — ImmoBack</title>
</head>
<body>
<section>

  <div class="page-header">
    <div>
      <h1>Annonces</h1>
      <p class="subtitle">Toutes les annonces immobilières publiées.</p>
    </div>
    <a th:href="@{/ads/new}" class="btn btn-primary">+ Nouvelle annonce</a>
  </div>

  <div class="table-wrapper">
    <table th:if="${not #lists.isEmpty(ads)}">
      <thead>
        <tr>
          <th style="width:55px">#</th>
          <th>Titre</th>
          <th>Pièces</th>
          <th>Surface</th>
          <th>Prix</th>
          <th>Créée le</th>
          <th style="width:190px">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="ad : ${ads}">
          <td class="cell-id" th:text="${ad.id}"></td>
          <td>
            <strong th:text="${ad.name}"></strong>
            <div class="cell-sub"
                 th:if="${ad.description != null and !#strings.isEmpty(ad.description)}"
                 th:text="${#strings.abbreviate(ad.description, 65)}"></div>
          </td>
          <td th:text="${ad.rooms != null ? ad.rooms + ' pce' : '—'}"></td>
          <td th:text="${ad.surface != null ? ad.surface + ' m²' : '—'}"></td>
          <td>
            <span th:if="${ad.price != null}"
                  th:text="${#numbers.formatDecimal(ad.price, 0, 'COMMA', 0, 'POINT') + ' €'}"></span>
            <span th:unless="${ad.price != null}">—</span>
          </td>
          <td>
            <span th:if="${ad.createdAt != null}"
                  th:text="${#temporals.format(ad.createdAt, 'dd/MM/yyyy')}"></span>
            <span th:unless="${ad.createdAt != null}">—</span>
          </td>
          <td>
            <div class="td-actions">
              <a th:href="@{'/ads/' + ${ad.id} + '/edit'}" class="btn btn-edit">Modifier</a>
              <form th:action="@{'/ads/' + ${ad.id} + '/delete'}" method="post"
                    onsubmit="return confirm('Supprimer cette annonce ?')">
                <button type="submit" class="btn btn-danger">Supprimer</button>
              </form>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
	<!-- Pagination -->
	<div th:if="${totalPages > 1}" class="pagination">
	  <span class="pagination-info">
	    Page <strong th:text="${currentPage + 1}"></strong>
	    sur <strong th:text="${totalPages}"></strong>
	    — <span th:text="${totalElements}"></span> annonce(s)
	  </span>
	  <div class="pagination-controls">
	    <!-- Précédent -->
	    <a th:if="${currentPage > 0}"
	       th:href="@{/ads(page=${currentPage - 1}, size=${size})}"
	       class="btn btn-secondary btn-sm">← Précédent</a>
	    <span th:unless="${currentPage > 0}" class="btn btn-secondary btn-sm disabled">← Précédent</span>
	
	    <!-- Pages numérotées -->
	    <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
	      <a th:if="${i != currentPage}"
	         th:href="@{/ads(page=${i}, size=${size})}"
	         th:text="${i + 1}"
	         class="btn btn-secondary btn-sm"></a>
	      <span th:if="${i == currentPage}"
	            th:text="${i + 1}"
	            class="btn btn-primary btn-sm"></span>
	    </span>
	
	    <!-- Suivant -->
	    <a th:if="${currentPage + 1 < totalPages}"
	       th:href="@{/ads(page=${currentPage + 1}, size=${size})}"
	       class="btn btn-secondary btn-sm">Suivant →</a>
	    <span th:unless="${currentPage + 1 < totalPages}" class="btn btn-secondary btn-sm disabled">Suivant →</span>
	  </div>
	</div>
    <div th:if="${#lists.isEmpty(ads)}" class="empty-state">
      <div class="empty-icon"></div>
      <p>Aucune annonce pour le moment.</p>
      <a th:href="@{/ads/new}" class="btn btn-primary" style="margin-top:1.25rem">
        Créer la première annonce
      </a>
    </div>
  </div>

</section>
</body>
</html>
