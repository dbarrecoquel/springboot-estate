<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content)">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:replace="${title}">Backoffice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap"
        rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    <span class="brand-icon"></span>
    <span class="brand-name">ImmoBack</span>
  </div>
  <ul class="navbar-nav">
    <li>
  <a th:href="@{/ads}"
     th:classappend="${#strings.startsWith(currentUri, '/ads') and !#strings.startsWith(currentUri, '/adstypes')} ? ' active'">
    Annonces
  </a>
</li>
<li>
  <a th:href="@{/adstypes}"
     th:classappend="${#strings.startsWith(currentUri, '/adstypes')} ? ' active'">
    Types
  </a>
</li>
  </ul>
</nav>

<main class="main-content">

  <div th:if="${successMessage}" class="alert alert-success">
    <span class="alert-icon">✓</span>
    <span th:text="${successMessage}"></span>
  </div>
  <div th:if="${errorMessage}" class="alert alert-error">
    <span class="alert-icon">✗</span>
    <span th:text="${errorMessage}"></span>
  </div>

  <div th:replace="${content}"><!-- contenu de la page --></div>

</main>

<footer class="footer">
  <p>Backoffice immobilier</p>
</footer>

</body>
</html>
